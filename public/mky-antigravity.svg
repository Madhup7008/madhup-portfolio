<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0A" />
  
  <!-- Glow Effect (Simplified for SVG) -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- M Monogram with Antigravity effect -->
  <g filter="url(#glow)">
    <!-- Base stable parts of M -->
    <path d="M25 75V45" stroke="#00F0FF" stroke-width="4" stroke-linecap="round" />
    <path d="M75 75V45" stroke="#00F0FF" stroke-width="4" stroke-linecap="round" />
    <path d="M25 45L50 65L75 45" fill="none" stroke="#00F0FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Floating segments (Antigravity effect) -->
    <!-- Small pieces floating upward -->
    <rect x="23" y="25" width="4" height="10" rx="1" fill="#00F0FF" opacity="0.8">
      <animate attributeName="y" values="25;20;25" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="73" y="30" width="4" height="6" rx="1" fill="#00F0FF" opacity="0.6">
      <animate attributeName="y" values="30;22;30" dur="4s" repeatCount="indefinite" />
    </rect>
    <path d="M48 35L52 35" stroke="#00F0FF" stroke-width="4" stroke-linecap="round">
      <animate attributeName="transform" attributeType="XML" type="translate" values="0,0; 0,-10; 0,0" dur="5s" repeatCount="indefinite" />
    </path>
    <circle cx="50" cy="20" r="2" fill="#00F0FF">
       <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
